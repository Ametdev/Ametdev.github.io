# Site settings
title: Портфолио Разработчика
email: your.email@example.com
description: >-
  Портфолио программиста с опытом работы в 1С, MATLAB и Python.
  Разработка бизнес-приложений, научные вычисления, автоматизация.
baseurl: ""
url: "https://ametdev.github.io"

# Social links (обновите своими данными)
github_username: yourusername
telegram_username: yourusername

# Build settings
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:name/

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache
